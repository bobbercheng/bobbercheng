const nodes=[], edges=[], catNames=Object.keys(categories);
catNames.forEach((cat,ci)=>{
  nodes.push({id:'cat_'+ci, type:'category', name:cat, color:categories[cat].color, r:26, catIndex:ci, products:categories[cat].products.length});
  categories[cat].products.forEach(p=>{
    const rc=p.repos.length;
    const pr=Math.max(7,Math.min(18,5+rc*1.2));
    nodes.push({...p, type:'product', catIndex:ci, r:pr, repoCount:rc});
    edges.push({source:'cat_'+ci, target:p.id, strength:0.4});
    // Add repo nodes
    p.repos.forEach((repo,ri)=>{
      const rid='repo_'+p.id+'_'+ri;
      nodes.push({id:rid, type:'repo', name:repo.n, repoPath:repo.p, repoDesc:repo.d, color:categories[cat].color, r:3, catIndex:ci, parentProduct:p.id});
      edges.push({source:p.id, target:rid, strength:0.6, type:'repo'});
    });
  });
});

// Add tech component nodes (if techComponents is defined)
const techNames=typeof techComponents!=='undefined'?Object.keys(techComponents):[];
techNames.forEach(tech=>{
  const td=techComponents[tech];
  const sz=Math.max(4,Math.min(14,2+td.count*0.6));
  nodes.push({id:'tech_'+tech, type:'tech', name:tech, color:td.color, techCat:td.category, r:sz, repoCount:td.count});
  td.repos.forEach(repoName=>{
    const repoNode=nodes.find(n=>n.type==='repo'&&n.name===repoName);
    if(repoNode) edges.push({source:'tech_'+tech, target:repoNode.id, strength:0.12, type:'tech'});
  });
});

// Add product dependency edges (if productDeps is defined)
if(typeof productDeps!=='undefined'){
  productDeps.forEach(d=>{
    const src=nodes.find(n=>n.type==='product'&&n.id===d.from);
    const tgt=nodes.find(n=>n.type==='product'&&n.id===d.to);
    if(src&&tgt) edges.push({source:d.from, target:d.to, strength:0.2, type:'dep', label:d.label||''});
  });
}

// Add cross-reference edges (if crossRefs is defined)
if(typeof crossRefs!=='undefined'){
  crossRefs.forEach(r=>{
    const src=nodes.find(n=>n.type==='product'&&n.id===r.from);
    const tgt=nodes.find(n=>n.type==='product'&&n.id===r.to);
    if(src&&tgt) edges.push({source:r.from, target:r.to, strength:0.08, type:'ref'});
  });
}

let W,H,dpr=window.devicePixelRatio||1;

}

nodes.forEach((n,i)=>{
  if(n.type==='category'){
    const ci=parseInt(n.id.split('_')[1]);
    const a=(ci/catNames.length)*Math.PI*2-Math.PI/2;
    const rx=isMobile?260:420, ry=isMobile?200:340;
    n.x=W/2+Math.cos(a)*rx; n.y=H/2+Math.sin(a)*ry;
  } else if(n.type==='product'){
    const c=nodes.find(x=>x.id==='cat_'+n.catIndex);
    const a=Math.random()*Math.PI*2, s=(isMobile?90:160)+Math.random()*(isMobile?90:200);
    n.x=c.x+Math.cos(a)*s; n.y=c.y+Math.sin(a)*s;
  } else if(n.type==='tech'){
    const ti=techNames.indexOf(n.name);
    const a=(ti/Math.max(techNames.length,1))*Math.PI*2+0.5;
    const rx=isMobile?320:550, ry=isMobile?260:440;
    n.x=W/2+Math.cos(a)*(rx+Math.random()*(isMobile?30:80));
    n.y=H/2+Math.sin(a)*(ry+Math.random()*(isMobile?30:80));
  } else {
    const parent=nodes.find(x=>x.id===n.parentProduct);
    const a=Math.random()*Math.PI*2, s=(isMobile?35:60)+Math.random()*(isMobile?35:80);
    n.x=parent.x+Math.cos(a)*s; n.y=parent.y+Math.sin(a)*s;
  }
  n.vx=0;n.vy=0;
});

function simulate(alpha){
  alpha=alpha||0.15;
  // Index for fast edge lookups
  const ni={};nodes.forEach((n,i)=>ni[n.id]=i);
  // All-pairs repulsion for non-repo; repo repels within range
  for(let i=0;i<nodes.length;i++){
    if(nodes[i]._h)continue;
    for(let j=i+1;j<nodes.length;j++){
      if(nodes[j]._h)continue;
      const a=nodes[i],b=nodes[j];
      // Cross-product repos: skip if far
      if(a.type==='repo'&&b.type==='repo'&&a.parentProduct!==b.parentProduct){
        const dd=Math.hypot(a.x-b.x,a.y-b.y);if(dd>150)continue;
      }
      let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      // Larger minimum distance based on node types
      let minD;
      if(a.type==='repo'||b.type==='repo') minD=(a.r+b.r+20)*4;
      else minD=(a.r+b.r+30)*5;
      if(d<minD){let f=(minD-d)*0.04*alpha;a.vx-=(dx/d)*f;a.vy-=(dy/d)*f;b.vx+=(dx/d)*f;b.vy+=(dy/d)*f;}
    }
  }
  // Edge springs
  edges.forEach(e=>{
    let si=ni[e.source],ti=ni[e.target];if(si===undefined||ti===undefined)return;
    let s=nodes[si],t=nodes[ti];
    let dx=t.x-s.x,dy=t.y-s.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    let td;
    if(e.type==='repo') td=isMobile?62:90;
    else if(e.type==='tech') td=isMobile?190:280;
    else if(e.type==='dep') td=isMobile?260:400;
    else if(e.type==='ref') td=isMobile?230:350;
    else td=isMobile?150:220;
    let str=e.type==='repo'?0.5:(e.strength||0.25);
    let f=(d-td)*0.003*alpha*str;
    s.vx+=(dx/d)*f;s.vy+=(dy/d)*f;t.vx-=(dx/d)*f;t.vy-=(dy/d)*f;
  });
  // Gentle centering + damping
  nodes.forEach(n=>{n.vx+=(W/2-n.x)*0.00015;n.vy+=(H/2-n.y)*0.00015;n.vx*=0.65;n.vy*=0.65;n.x+=n.vx;n.y+=n.vy;});
}
// Warm-up: run 800 iterations before first render
for(let i=0;i<800;i++) simulate(0.6-i*0.0005);

// Auto-fit: zoom/pan to frame all nodes with padding
function autoFit(){
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  nodes.forEach(n=>{if(n.x-n.r<minX)minX=n.x-n.r;if(n.x+n.r>maxX)maxX=n.x+n.r;if(n.y-n.r<minY)minY=n.y-n.r;if(n.y+n.r>maxY)maxY=n.y+n.r;});
  const padX=isMobile?28:80, padTop=isMobile?110:100, padBot=isMobile?95:80;
  const gw=maxX-minX+padX*2, gh=maxY-minY+padTop+padBot;
  const k=Math.min(W/gw,H/gh,1.0);
  const cx=minX+(maxX-minX)/2,cy=minY+(maxY-minY)/2+10;
  tf.k=k;tf.x=W/2-cx*k;tf.y=H/2-cy*k;
}

let tf={x:0,y:0,k:1},hov=null,sel=null,search='',hidden=new Set(),time=0;
let connectedSet=new Set(), connectedEdges=new Set();
function s2w(sx,sy){return{x:(sx-tf.x)/tf.k,y:(sy-tf.y)/tf.k};}

function updateConnected(){
  connectedSet.clear(); connectedEdges.clear();
  if(!hov&&!sel)return;
  const focus=hov||sel;
  connectedSet.add(focus.id);
  // First pass: direct connections
  edges.forEach((e,ei)=>{
    if(e.source===focus.id||e.target===focus.id){
      connectedEdges.add(ei); connectedSet.add(e.source); connectedSet.add(e.target);
    }
  });
  // Tech connections: only expand when hovering a tech node directly
  if(focus.type==='tech'){
    edges.forEach((e,ei)=>{
      if(e.type==='tech'&&(e.source===focus.id||e.target===focus.id)){
        connectedEdges.add(ei);connectedSet.add(e.source);connectedSet.add(e.target);
      }
    });
    // Also highlight parent products of connected repos
    connectedSet.forEach(id=>{
      const n=nodes.find(x=>x.id===id);
      if(n&&n.type==='repo'&&n.parentProduct){
        connectedSet.add(n.parentProduct);
        edges.forEach((e,ei)=>{if(e.source===n.parentProduct&&e.target===id||e.target===n.parentProduct&&e.source===id){connectedEdges.add(ei);}});
      }
    });
  }
  // When hovering a repo, show its tech nodes (but don't expand further)
  if(focus.type==='repo'){
    edges.forEach((e,ei)=>{
      if(e.type==='tech'&&(e.source===focus.id||e.target===focus.id)){
        connectedEdges.add(ei);connectedSet.add(e.source);connectedSet.add(e.target);
      }
    });
  }
  // Second pass: if hovering category or product, include repos of connected products
  if(focus.type==='category'||focus.type==='product'){
    const products=new Set([...connectedSet].filter(id=>{const n=nodes.find(x=>x.id===id);return n&&n.type==='product';}));
    edges.forEach((e,ei)=>{
      const s=nodes.find(n=>n.id===e.source),t=nodes.find(n=>n.id===e.target);
      if(!s||!t)return;
      if((products.has(e.source)&&t.type==='repo')||(products.has(e.target)&&s.type==='repo')){
        connectedEdges.add(ei); connectedSet.add(e.source); connectedSet.add(e.target);
      }
    });
  }
  // If hovering a repo, also highlight sibling repos and parent product
  if(focus.type==='repo'){
    const parentId=focus.parentProduct;
    connectedSet.add(parentId);
    edges.forEach((e,ei)=>{
      if(e.source===parentId||e.target===parentId){
        connectedEdges.add(ei); connectedSet.add(e.source); connectedSet.add(e.target);
      }
    });
  }
}

function draw(){
  time+=0.016;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.translate(tf.x,tf.y);ctx.scale(tf.k,tf.k);
  const focusing=hov||sel;
  const zoomShowRepoLabels=tf.k>1.5;
  const zoomShowRepos=tf.k>0.4;

  // Draw edges
  edges.forEach((e,ei)=>{
    let s=nodes.find(n=>n.id===e.source),t=nodes.find(n=>n.id===e.target);if(!s||!t||s._h||t._h)return;
    // repo edges always visible
    const isConn=connectedEdges.has(ei);

    if(focusing&&!isConn){
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(t.x,t.y);
      ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.4;ctx.stroke();
      return;
    }
    if(focusing&&isConn){
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(t.x,t.y);
      if(e.type==='dep'){ctx.setLineDash([5,3]);ctx.strokeStyle='rgba(255,200,120,0.5)';ctx.lineWidth=1.5;ctx.stroke();ctx.setLineDash([]);}
      else if(e.type==='ref'){ctx.setLineDash([3,5]);ctx.strokeStyle='rgba(100,160,255,0.45)';ctx.lineWidth=1.2;ctx.stroke();ctx.setLineDash([]);}
      else ctx.strokeStyle=e.type==='repo'?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.35)';
      ctx.lineWidth=e.type==='repo'?0.8:1.2;ctx.stroke();
      // Particles on non-repo edges (or repo edges when zoomed)
      if(e.type!=='repo'||(e.type==='repo'&&tf.k>0.8)){
        const focusId=(hov||sel).id;
        let fx,fy,tx,ty;
        if(e.target===focusId||connectedSet.has(e.target)&&nodes.find(n=>n.id===e.target)?.type==='category'){fx=s.x;fy=s.y;tx=t.x;ty=t.y;}
        else{fx=t.x;fy=t.y;tx=s.x;ty=s.y;}
        const pc=e.type==='repo'?2:3, sp=0.4;
        for(let pi=0;pi<pc;pi++){
          const ph=(time*sp+pi/pc)%1;
          const px=fx+(tx-fx)*ph, py=fy+(ty-fy)*ph;
          const br=0.15+ph*0.5, rad=e.type==='repo'?0.8+ph:1.5+ph*2;
          const col=focusing.color||'#c4a46c';
          ctx.beginPath();ctx.arc(px,py,rad,0,Math.PI*2);
          ctx.fillStyle=col;ctx.globalAlpha=br;ctx.fill();
          ctx.beginPath();ctx.arc(px,py,rad*2.5,0,Math.PI*2);
          ctx.fillStyle=col;ctx.globalAlpha=br*0.12;ctx.fill();
          ctx.globalAlpha=1;
        }
      }
    } else {
      // Default - all edges visible (arscontexta style)
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(t.x,t.y);
      if(e.type==='dep'){
        // Dashed line for dependencies
        ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(255,180,100,0.15)';ctx.lineWidth=0.8;ctx.stroke();ctx.setLineDash([]);
        // Don't fall through to second stroke
      } else if(e.type==='ref'){
        // Dotted line for cross-references
        ctx.setLineDash([2,4]);ctx.strokeStyle='rgba(100,160,255,0.12)';ctx.lineWidth=0.6;ctx.stroke();ctx.setLineDash([]);
      } else if(e.type==='tech'){
        ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=0.3;
      } else if(e.type==='repo'){
        ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.5;
      } else {
        ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=0.8;
      }
      ctx.stroke();
      {
        // Ambient flowing particles on ALL edges (arscontexta style)
        const nPart=e.type==='repo'?1:2;
        for(let pi=0;pi<nPart;pi++){
          const sp=0.12+pi*0.05;
          const ph2=(time*sp+ei*0.37+pi*0.5)%1;
          const apx=s.x+(t.x-s.x)*ph2, apy=s.y+(t.y-s.y)*ph2;
          const col='rgba(220,210,180,';
          // Bright core
          const rad=1.2+ph2*1.0;
          ctx.beginPath();ctx.arc(apx,apy,rad,0,Math.PI*2);
          ctx.globalAlpha=0.25+ph2*0.2;ctx.fillStyle=col+'1)';ctx.fill();
          // Soft glow
          ctx.beginPath();ctx.arc(apx,apy,rad*3,0,Math.PI*2);
          ctx.globalAlpha=0.06+ph2*0.04;ctx.fillStyle=col+'1)';ctx.fill();
          ctx.globalAlpha=1;
        }
      }
    }
  });

  // Draw nodes
  nodes.forEach(n=>{
    if(n._h)return;
    const isConn=connectedSet.has(n.id);
    const isFocus=n===hov||n===sel;
    const hoverDim=focusing&&!isConn;
    const searchDim=search&&!n._m;
    const searchHit=search&&n._m;

    // All nodes always visible (arscontexta style)

    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);

    if(searchDim){
      ctx.fillStyle=n.type==='repo'?'rgba(200,195,185,0.08)':n.color+'15';ctx.fill();
      if(n.type!=='repo'&&(tf.k>0.4||n.type==='category')){
        ctx.font=n.type==='category'?'500 10px monospace':'9px monospace';
        ctx.fillStyle='rgba(255,255,255,0.1)';ctx.textAlign='center';ctx.fillText(n.name,n.x,n.y+n.r+12);
      }
      return;
    }
    if(hoverDim){
      ctx.fillStyle=n.type==='repo'?'rgba(200,195,185,0.18)':n.type==='tech'?n.color+'22':n.color+'44';ctx.fill();
      ctx.font=n.type==='category'?'500 10px monospace':n.type==='repo'?'7px monospace':'9px monospace';
      ctx.fillStyle='rgba(255,255,255,0.18)';ctx.textAlign='center';
      ctx.fillText(n.name,n.x,n.y+n.r+(n.type==='repo'?7:12));
      return;
    }
    if(searchHit&&!isFocus){
      ctx.shadowBlur=n.type==='repo'?8:18;ctx.shadowColor=n.color;
      ctx.fillStyle=n.color+(n.type==='repo'?'bb':'dd');ctx.fill();ctx.shadowBlur=0;
      ctx.font=n.type==='repo'?'500 8px monospace':n.type==='category'?'500 11px monospace':'500 10px monospace';
      ctx.fillStyle='rgba(255,255,255,0.85)';ctx.textAlign='center';
      ctx.fillText(n.name,n.x,n.y+n.r+(n.type==='repo'?8:13));
      return;
    }

    if(isFocus){
      ctx.shadowBlur=n.type==='repo'?15:30;ctx.shadowColor=n.color;
      ctx.fillStyle=n.color+'cc';ctx.fill();ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+2,0,Math.PI*2);
      ctx.strokeStyle=n.color;ctx.lineWidth=n.type==='repo'?1:1.5;ctx.stroke();
      if(n.type!=='repo'){
        const pulse=Math.sin(time*3)*0.3+0.7;
        ctx.beginPath();ctx.arc(n.x,n.y,n.r+6+pulse*4,0,Math.PI*2);
        ctx.strokeStyle=n.color;ctx.globalAlpha=0.08*pulse;ctx.lineWidth=1;ctx.stroke();ctx.globalAlpha=1;
      }
    } else if(isConn){
      ctx.fillStyle=n.type==='repo'?'rgba(255,250,240,0.85)':n.type==='tech'?n.color+'cc':n.color+'dd';ctx.fill();
      if(n.type!=='repo'){ctx.beginPath();ctx.arc(n.x,n.y,n.r+1,0,Math.PI*2);ctx.strokeStyle=n.color+'44';ctx.lineWidth=1;ctx.stroke();}
    } else {
      // Default
      if(n.type==='tech'){
      ctx.font=isFocus?'500 9px monospace':'500 7px monospace';
      ctx.fillStyle=isFocus?'rgba(255,255,255,0.9)':isConn?'rgba(255,255,255,0.65)':'rgba(255,255,255,0.35)';
      ctx.textAlign='center';ctx.fillText(n.name,n.x,n.y+n.r+8);
      if(isFocus){ctx.font='7px monospace';ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fillText(n.techCat+' · '+n.repoCount+' repos',n.x,n.y+n.r+17);}
    } else if(n.type==='repo'){
        ctx.fillStyle='rgba(220,215,205,0.55)';ctx.fill();
      } else if(n.type==='tech'){
        ctx.fillStyle=n.color+'77';ctx.fill();
        ctx.font='500 7px monospace';ctx.fillStyle='rgba(255,255,255,0.35)';ctx.textAlign='center';
        ctx.fillText(n.name,n.x,n.y+n.r+8);
      } else {
        ctx.fillStyle=n.color+(n.type==='category'?'cc':'99');ctx.fill();
      }
    }

    // Labels
    if(n.type==='repo'){
      // Only show repo labels on hover/select/search
      if(isFocus||isConn||searchHit){
        ctx.font=isFocus?'500 8px monospace':'7px monospace';
        ctx.fillStyle=isFocus?'rgba(255,255,255,0.9)':isConn?'rgba(255,255,255,0.65)':searchHit?'rgba(255,255,255,0.75)':'rgba(255,255,255,0.35)';
        ctx.textAlign='center';ctx.fillText(n.name,n.x,n.y+n.r+7);
      }
    } else {
      // Always show product/category labels
      ctx.font=n.type==='category'?'500 11px monospace':`${isFocus?'500 ':''}10px monospace`;
      let la=isFocus?0.95:isConn?0.8:(n.type==='category'?0.6:0.45);
      ctx.fillStyle=`rgba(255,255,255,${la})`;ctx.textAlign='center';
      ctx.fillText(n.name,n.x,n.y+n.r+12);
      if(n.type==='product'&&isFocus&&n.repoCount){ctx.font='8px monospace';ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillText(n.repoCount+(n.repoCount===1?' repo':' repos'),n.x,n.y+n.r+22);}
    }
  });

  ctx.restore();simulate();requestAnimationFrame(draw);
}

// ============ INTERACTION ============
let dragging=false,dStart={x:0,y:0},dNode=null;
canvas.onmousedown=e=>{
  const wp=s2w(e.clientX,e.clientY);
  const hit=nodes.find(n=>!n._h&&(n.type!=='repo'||tf.k>0.4||(hov||sel))&&Math.hypot(n.x-wp.x,n.y-wp.y)<n.r+4);
  if(hit)dNode=hit;else dragging=true;
  dStart={x:e.clientX,y:e.clientY};
};
canvas.onmousemove=e=>{
  if(dragging){tf.x+=e.clientX-dStart.x;tf.y+=e.clientY-dStart.y;dStart={x:e.clientX,y:e.clientY};return;}
  if(dNode){const wp=s2w(e.clientX,e.clientY);dNode.x=wp.x;dNode.y=wp.y;dNode.vx=0;dNode.vy=0;return;}
  const wp=s2w(e.clientX,e.clientY);
  // Prioritize product/category hits, then repos
  let hit=nodes.find(n=>!n._h&&n.type!=='repo'&&n.type!=='tech'&&Math.hypot(n.x-wp.x,n.y-wp.y)<n.r+4);
  if(!hit) hit=nodes.find(n=>!n._h&&n.type==='tech'&&Math.hypot(n.x-wp.x,n.y-wp.y)<n.r+5);
  if(!hit) hit=nodes.find(n=>!n._h&&n.type==='repo'&&(tf.k>0.6||(hov||sel))&&Math.hypot(n.x-wp.x,n.y-wp.y)<n.r+5);
  if(hit!==hov){hov=hit;updateConnected();}
  canvas.style.cursor=hit?'pointer':'default';
  const tt=document.getElementById('tooltip');
  if(hit&&!dNode){
    tt.style.display='block';tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-8)+'px';
    tt.querySelector('.tt-name').textContent=hit.name;
    tt.querySelector('.tt-cat').textContent=hit.type==='category'?hit.products+' products':hit.type==='tech'?(hit.techCat+' · '+hit.repoCount+' repos'):hit.type==='repo'?(hit.repoDesc||''):(hit.desc||'').slice(0,90);
    tt.querySelector('.tt-path').textContent=hit.type==='repo'?(hit.repoPath||''):'';
  } else tt.style.display='none';
};
canvas.onmouseup=e=>{
  if(dNode&&Math.hypot(e.clientX-dStart.x,e.clientY-dStart.y)<5){
    sel=sel===dNode?null:dNode;updateConnected();
    if(sel&&sel.type==='product')openPanel(sel);
    else if(sel&&sel.type==='repo'){const parent=nodes.find(n=>n.id===sel.parentProduct);if(parent)openPanel(parent);}
    else document.getElementById('panel').classList.remove('open');
  }
  dragging=false;dNode=null;
};
canvas.onwheel=e=>{e.preventDefault();const f=e.deltaY>0?0.92:1.08;const wp=s2w(e.clientX,e.clientY);tf.k=Math.max(0.15,Math.min(6,tf.k*f));tf.x=e.clientX-wp.x*tf.k;tf.y=e.clientY-wp.y*tf.k;};

// Touch gestures (mobile/tablet): one-finger pan/drag, two-finger pinch zoom
let touchMode=null, pinchStartDist=0, pinchStartK=1, pinchCenter={x:0,y:0};
function touchDistance(t1,t2){const dx=t2.clientX-t1.clientX,dy=t2.clientY-t1.clientY;return Math.hypot(dx,dy);} 
function touchCenter(t1,t2){return {x:(t1.clientX+t2.clientX)/2,y:(t1.clientY+t2.clientY)/2};}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const t=e.touches[0], wp=s2w(t.clientX,t.clientY);
    const hit=nodes.find(n=>!n._h&&Math.hypot(n.x-wp.x,n.y-wp.y)<n.r+8);
    if(hit){ dNode=hit; touchMode='drag-node'; }
    else { touchMode='pan'; dragging=true; }
    dStart={x:t.clientX,y:t.clientY};
  } else if(e.touches.length>=2){
    touchMode='pinch';
    dragging=false; dNode=null;
    const [t1,t2]=[e.touches[0],e.touches[1]];
    pinchStartDist=touchDistance(t1,t2);
    pinchStartK=tf.k;
    pinchCenter=touchCenter(t1,t2);
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(touchMode==='pinch' && e.touches.length>=2){
    const [t1,t2]=[e.touches[0],e.touches[1]];
    const c=touchCenter(t1,t2);
    const dist=Math.max(1,touchDistance(t1,t2));
    const scale=dist/Math.max(1,pinchStartDist);
    const wp=s2w(c.x,c.y);
    tf.k=Math.max(0.15,Math.min(6,pinchStartK*scale));
    tf.x=c.x-wp.x*tf.k; tf.y=c.y-wp.y*tf.k;
    return;
  }
  if(e.touches.length!==1) return;
  const t=e.touches[0];
  if(touchMode==='pan' && dragging){
    tf.x+=t.clientX-dStart.x; tf.y+=t.clientY-dStart.y;
    dStart={x:t.clientX,y:t.clientY};
  } else if(touchMode==='drag-node' && dNode){
    const wp=s2w(t.clientX,t.clientY);
    dNode.x=wp.x; dNode.y=wp.y; dNode.vx=0; dNode.vy=0;
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  if(e.touches.length===0){
    dragging=false; dNode=null; touchMode=null;
  } else if(e.touches.length===1){
    // After pinch, continue as pan from remaining finger
    const t=e.touches[0];
    touchMode='pan'; dragging=true; dNode=null;
    dStart={x:t.clientX,y:t.clientY};
  }
},{passive:false});

function openPanel(node){
  const panel=document.getElementById('panel'),content=document.getElementById('panel-content');
  let h=`<h2>${node.name}</h2><span class="panel-category" style="border-color:${node.color}33;color:${node.color}">${catNames[node.catIndex]}</span><p class="panel-desc">${node.desc||''}</p>`;
  if(node.users)h+=`<h3>Users</h3><p class="users-section">${node.users}</p>`;
  if(node.tech&&node.tech.length){h+=`<h3>Tech Stack</h3><div>`;node.tech.forEach(t=>h+=`<span class="tech-tag">${t}</span>`);h+=`</div>`;}
  if(node.repos&&node.repos.length){h+=`<h3>Repositories (${node.repoCount})</h3>`;node.repos.forEach(r=>{h+=`<div class="repo-item"><div class="repo-name">${r.n}</div><div class="repo-path">${r.p}</div><div class="repo-desc">${r.d}</div></div>`;});}
  if(node.api_items&&node.api_items.length){h+=`<h3>API Documentation (${node.api_items.length})</h3>`;node.api_items.forEach(a=>{h+=`<div class="api-item"><span class="api-name">${a.n}</span><span class="api-type">${a.t||''}</span></div>`;});}
  if(node.blog_items&&node.blog_items.length){h+=`<h3>Blog Posts (${node.blog_items.length})</h3>`;node.blog_items.forEach(b=>{if(b.u){h+=`<div class="blog-item"><a href="${b.u}" target="_blank">${b.n}</a></div>`;}else{h+=`<div class="blog-item"><span class="blog-title">${b.n}</span></div>`;}});}
  content.innerHTML=h;panel.classList.add('open');
}
document.getElementById('panel-close').onclick=()=>{document.getElementById('panel').classList.remove('open');sel=null;updateConnected();};

document.getElementById('search').oninput=e=>{
  search=e.target.value.toLowerCase();
  nodes.forEach(n=>{
    if(n.type==='category'){n._m=true;return;}
    if(n.type==='tech'){
      n._m=!search||n.name.toLowerCase().includes(search)||(n.techCat||'').toLowerCase().includes(search);
      return;
    }
    if(n.type==='repo'){
      n._m=!search||n.name.toLowerCase().includes(search)||(n.repoPath||'').toLowerCase().includes(search)||(n.repoDesc||'').toLowerCase().includes(search);
      return;
    }
    n._m=!search||n.name.toLowerCase().includes(search)||(n.desc||'').toLowerCase().includes(search)||(n.tech||[]).some(t=>t.toLowerCase().includes(search))||(n.repos||[]).some(r=>r.n.toLowerCase().includes(search)||r.d.toLowerCase().includes(search))||(n.api_items||[]).some(a=>a.n.toLowerCase().includes(search))||(n.blog_items||[]).some(b=>b.n.toLowerCase().includes(search));
  });
};

const legendEl=document.getElementById('legend');
catNames.forEach((cat,i)=>{const item=document.createElement('div');item.className='legend-item filter-active';item.innerHTML=`<span class="legend-dot" style="background:${categories[cat].color};color:${categories[cat].color}"></span>${cat}`;item.onclick=()=>{if(hidden.has(i)){hidden.delete(i);item.classList.add('filter-active');item.style.opacity='';}else{hidden.add(i);item.classList.remove('filter-active');item.style.opacity='0.2';}nodes.forEach(n=>{if(n.type==='category'&&n.id==='cat_'+i)n._h=hidden.has(i);if((n.type==='product'||n.type==='repo')&&n.catIndex===i)n._h=hidden.has(i);});};legendEl.appendChild(item);});

autoFit();
draw();

// iOS Safari gesture zoom guard
['gesturestart','gesturechange','gestureend'].forEach(evt=>{
  document.addEventListener(evt, e=>e.preventDefault(), {passive:false});
});
</script>
</body>
